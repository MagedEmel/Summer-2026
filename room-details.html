<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>تفاصيل الغرفة</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="assets/logo.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <!-- Header -->
      <div class="logo-box">
        <img src="assets/logo.png" alt="Conference Logo" />

        <h3>مؤتمر صيف ٢٠٢٦</h3>
      </div>
      <div class="card">
        <div class="card-title">
          <button onclick="goBack()" style="width: 45px">⬅</button>

          <h2 id="roomTitle">اسم الغرفة</h2>
        </div>
      </div>

      <!-- Room Info -->

      <div class="card">
        <h3 style="text-align: center; margin-bottom: 10px">
          أسماء أفراد الغرفة
        </h3>

        <p
          id="remainingInfo"
          style="text-align: center; margin-bottom: 20px; color: #777"></p>

        <div id="membersContainer">
          <!-- يتم إنشاء الخانات ديناميكياً -->
        </div>

        <button
          type="button"
          class="btn-gold"
          id="addPersonBtn"
          onclick="addPersonInput()">
          ➕ إضافة شخص آخر
        </button>
      </div>

      <!-- Notes -->

      <div class="card">
        <label> ملاحظات (اختياري) </label>

        <textarea id="roomNotes" placeholder="اكتب أي ملاحظات..."> </textarea>
      </div>

      <!-- Save -->

      <button class="btn-green" onclick="saveRoom()">تأكيد الحجز</button>
    </div>

    <script src="js/main.js"></script>

    <script type="module" src="js/room-details.js"></script>
  </body>
</html>
