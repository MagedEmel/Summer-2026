<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>تسجيل دخول الأدمن</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="assets/logo.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="logo-box">
        <img src="assets/logo.png" alt="Conference Logo" />

        <h3>مؤتمر صيف ٢٠٢٦</h3>
      </div>
      <div class="card">
        <div class="card-title">
          <button onclick="goBack()" style="width: 45px">⬅</button>

          <h2>لوحة التحكم</h2>
        </div>
      </div>

      <div class="card">
        <div style="text-align: center; font-size: 55px">🔐</div>

        <p style="text-align: center; color: #999; margin: 15px 0">
          أدخل كلمة المرور للدخول
        </p>

        <label> كلمة المرور </label>

        <input type="password" id="adminPassword" placeholder="********" />

        <button class="btn-gold" onclick="loginAdmin()">دخول</button>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script type="module" src="js/admin-login.js"></script>
  </body>
</html>
